<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Empleo - SotfwareHouse</title>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>
    <main class="contenedor">
        <section class="tarjeta">
            <div class="encabezado">
                <p class="etiqueta">SotfwareHouse</p>
                <h1>Solicitud de empleo</h1>
                <p>Empresa de dropshipping en busca de talento para su equipo.</p>
            </div>

            <form id="formularioSolicitud" novalidate>
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ej. Andy Smith"
                        autocomplete="name"
                    >
                </div>

                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <input
                        type="email"
                        id="correo"
                        name="correo"
                        placeholder="Ej. andy.smith@email.com"
                        autocomplete="email"
                    >
                </div>

                <div class="campo">
                    <label for="cargo">Cargo al que aplica</label>
                    <select id="cargo" name="cargo">
                        <option value="">Selecciona un cargo</option>
                        <option value="Asistente de tienda online">Asistente de tienda online</option>
                        <option value="Atención al cliente">Atención al cliente</option>
                        <option value="Gestor de pedidos">Gestor de pedidos</option>
                        <option value="Marketing digital">Marketing digital</option>
                        <option value="Diseñador de productos">Diseñador de productos</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="mensaje">Mensaje</label>
                    <textarea
                        id="mensaje"
                        name="mensaje"
                        rows="5"
                        placeholder="Escribe brevemente por qué deseas aplicar al empleo"
                    ></textarea>
                </div>

                <div class="campo">
                    <label for="curriculum">Adjuntar currículum</label>
                    <input
                        type="file"
                        id="curriculum"
                        name="curriculum"
                        accept=".pdf,.doc,.docx"
                    >
                    <small>Formatos permitidos: PDF, DOC o DOCX.</small>
                </div>

                <button type="submit">Registrar solicitud</button>
            </form>

            <p id="mensajeEstado" class="mensaje" aria-live="polite"></p>
        </section>

        <section class="tarjeta resultado" id="resultado">
            <h2>Solicitud registrada</h2>
            <p class="vacio">Aún no se ha registrado ninguna solicitud.</p>
        </section>
    </main>

    <script src="Script.js"></script>
</body>
</html>
